services:
  - type: web
    name: fashion-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: fashion-ai-backend-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: Fashion AI App API
      - key: API_PREFIX
        value: /api
      - key: SQLITE_URL
        value: sqlite:////var/data/fashion_ai_app.db
      - key: LOCAL_IMAGE_DIR
        value: /var/data/images
      - key: AI_PROVIDER
        value: auto
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_IMAGE_DETAIL
        value: low
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: fashion-ai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
